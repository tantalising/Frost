name: frost
description: "State management solution that decouples business logic from UI effortlessly. 
Frost uses reactive Properties, intelligent Watchers, and Signals
to manage state with minimal boilerplate and high performance."

version: 2.0.0
homepage: "https://github.com/tantalising/frost"

environment:
  sdk: '>=3.3.4 <4.0.0'
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  test: ^1.24.9
